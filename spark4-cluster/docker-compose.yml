# Spark 4 cluster for Part 6 demos.
#
#   * spark-master / spark-worker  -> a classic standalone cluster (Spark UI on :9090)
#   * spark-connect                -> a Spark Connect server on gRPC :15002
#                                     (target of connect/SparkConnectPerformance)
#   * k3s-server                   -> a single-node Kubernetes cluster, in Docker, used
#                                     ONLY for the CPU-throttling demo. It is behind the
#                                     "k8s" profile so it does NOT start by default.
#
# Bring up the standalone cluster + Connect server:
#     docker compose up -d spark-master spark-worker spark-connect
#
# Bring up the Kubernetes node for the throttling demo (see k8s/README.md):
#     docker compose --profile k8s up -d spark-master k3s-server
#
services:
  spark-master:
    image: apache/spark:4.1.1-scala
    container_name: spark4-master
    command: /opt/spark/sbin/start-master.sh
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_NO_DAEMONIZE: "true"
      HOME: /opt/spark/work-dir
    ports:
      - "7077:7077"   # standalone master RPC
      - "9090:8080"   # standalone master web UI
      - "4040:4040"   # driver UI (when a job runs here)
    volumes:
      - ./spark-apps:/opt/spark-apps
      - ./spark-data:/opt/spark-data
      - ./k8s/kubeconfig:/kube   # used only when spark-master acts as the k8s submitter

  spark-worker:
    image: apache/spark:4.1.1-scala
    container_name: spark4-worker
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      SPARK_WORKER_CORES: "1"
      SPARK_WORKER_MEMORY: 1G
      SPARK_NO_DAEMONIZE: "true"
      HOME: /opt/spark/work-dir
    volumes:
      - ./spark-apps:/opt/spark-apps
      - ./spark-data:/opt/spark-data

  # Spark Connect server. The connect jar ships inside the apache/spark 4.1.1 image, so no
  # --packages download is needed. Runs its own driver in local[*] mode and serves gRPC.
  spark-connect:
    image: apache/spark:4.1.1-scala
    container_name: spark4-connect
    command: /opt/spark/sbin/start-connect-server.sh --master local[*]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      HOME: /opt/spark/work-dir
    ports:
      - "15002:15002" # gRPC endpoint -> SPARK_REMOTE=sc://localhost:15002
      - "4041:4040"   # this server's Spark UI
    volumes:
      - ./spark-apps:/opt/spark-apps
      - ./spark-data:/opt/spark-data

  # Single-node Kubernetes (k3s) in Docker. Profile-gated so `docker compose up` for the
  # other demos never starts it. tls-san k3s-server makes the API cert valid for the name
  # the spark-master submitter uses to reach it over the compose network.
  k3s-server:
    image: rancher/k3s:v1.31.5-k3s1
    container_name: spark4-k3s
    profiles: ["k8s"]
    command: server --disable traefik --disable metrics-server --disable servicelb --tls-san k3s-server
    privileged: true
    tmpfs:
      - /run
      - /var/run
    environment:
      K3S_TOKEN: sparkdemo
      K3S_KUBECONFIG_OUTPUT: /output/kubeconfig.yaml
      K3S_KUBECONFIG_MODE: "666"
    ports:
      - "6443:6443"   # Kubernetes API server
    volumes:
      - ./k8s/kubeconfig:/output      # k3s writes kubeconfig.yaml here
      - k3s-data:/var/lib/rancher/k3s

volumes:
  k3s-data:
